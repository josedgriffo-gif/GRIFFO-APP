<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRIFFO - Búsqueda por Medidas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; max-width: 480px; margin: 0 auto; }
        .header { background: linear-gradient(165deg, #005B82 0%, #00549F 55%, #003A75 100%); padding: 30px 20px 40px; border-radius: 0 0 32px 32px; text-align: center; position: relative; overflow: hidden; }
        .header::before, .header::after { content: ''; position: absolute; border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 50%; }
        .header::before { width: 300px; height: 150px; top: -50px; right: -100px; transform: rotate(73.5deg); }
        .header::after { width: 200px; height: 100px; bottom: -30px; left: -50px; transform: rotate(73.5deg); }
        .back-btn { position: absolute; left: 20px; top: 30px; color: white; font-size: 24px; text-decoration: none; z-index: 10; }
        .logo { width: 200px; margin: 0 auto 6px; position: relative; z-index: 1; }
        .slogan { color: #00ADD0; font-size: 12.5px; font-weight: 700; letter-spacing: 4.5px; margin-top: 6px; position: relative; z-index: 1; }
        .page-title { color: white; font-size: 16px; font-weight: 600; margin-top: 20px; position: relative; z-index: 1; }
        .container { padding: 20px; }
        .loading { text-align: center; padding: 60px 20px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #00549F; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .type-selector { display: grid; gap: 15px; }
        .type-btn { background: white; border: 3px solid #e0e0e0; border-radius: 16px; padding: 25px; cursor: pointer; display: flex; align-items: center; gap: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: all 0.3s; }
        .type-btn:active { transform: scale(0.98); }
        .type-btn.selected { border-color: #00549F; background: linear-gradient(165deg, #005B82 0%, #00549F 55%, #003A75 100%); }
        .type-icon { font-size: 48px; }
        .type-label { font-size: 18px; font-weight: 700; color: #00549F; }
        .type-btn.selected .type-label { color: white; }
        .table-section { display: none; }
        .table-section.active { display: block; }
        .table-header { display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; }
        .table-title { color: #00549F; font-size: 16px; font-weight: 700; }
        .change-type { color: #00ADD0; font-size: 14px; font-weight: 600; text-decoration: underline; cursor: pointer; border: none; background: none; }
        .products-table { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-height: 60vh; overflow-y: auto; }
        .products-table table { width: 100%; border-collapse: collapse; }
        .products-table th { background: #00549F; color: white; padding: 12px 6px; font-size: 10px; font-weight: 700; text-align: center; position: sticky; top: 0; z-index: 10; cursor: pointer; user-select: none; }
        .products-table th:hover { background: #003A75; }
        .products-table th:active { background: #005B82; }
        .sort-indicator { font-size: 14px; margin-left: 2px; }
        .products-table td { padding: 12px 6px; text-align: center; border-bottom: 1px solid #e0e0e0; font-size: 13px; }
        .products-table tbody tr { cursor: pointer; transition: background 0.2s; }
        .products-table tbody tr:hover { background: #f5f5f5; }
        .products-table tbody tr:active { background: #e3f2fd; }
        .code-cell { color: #00549F; font-weight: 700; font-size: 14px; }
        .measure-cell { color: #333; font-weight: 600; }
        .error { background: #ffebee; color: #c62828; padding: 20px; border-radius: 12px; text-align: center; font-weight: 600; }
        .no-data { text-align: center; padding: 40px 20px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-btn">←</a>
        <img src="/griffologoblancotransparente.png" alt="GRIFFO" class="logo">
        <div class="slogan">IMPULSAMOS SOLUCIONES</div>
        <div class="page-title">Búsqueda por Medidas</div>
    </div>
    <div class="container">
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <div style="color: #00549F; font-weight: 600;">Cargando productos...</div>
        </div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="typeSelector" class="type-selector" style="display: none;">
            <div class="type-btn" onclick="selectType('FT')">
                <div class="type-icon">🔧</div>
                <div><div class="type-label">FUELLE TRANSMISIÓN</div></div>
            </div>
            <div class="type-btn" onclick="selectType('TOPE')">
                <div class="type-icon">⚙️</div>
                <div><div class="type-label">TOPES</div></div>
            </div>
            <div class="type-btn" onclick="selectType('FD')">
                <div class="type-icon">🔩</div>
                <div><div class="type-label">FUELLE DIRECCIÓN</div></div>
            </div>
        </div>
        <div id="tableSection" class="table-section">
            <div class="table-header">
                <div class="table-title" id="tableTitle"></div>
                <button class="change-type" onclick="clearAll()">Cambiar tipo</button>
            </div>
            <div id="productsTable" class="products-table"></div>
        </div>
    </div>
    <script>
        let allProducts = [];
        let currentProducts = [];
        let selectedType = null;
        let sortColumn = 0;
        let sortAsc = false;
        async function init() {
            try {
                const response = await fetch('/api/products');
                if (!response.ok) throw new Error('Error al cargar productos');
                const data = await response.json();
                allProducts = data.data || [];
                document.getElementById('loading').style.display = 'none';
                document.getElementById('typeSelector').style.display = 'grid';
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Error: ' + error.message;
            }
        }
        function selectType(type) {
            selectedType = type;
            sortColumn = 0;
            sortAsc = false;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
            event.target.closest('.type-btn').classList.add('selected');
            processProducts();
        }
        function processProducts() {
            let filtered = [];
            if (selectedType === 'FT') {
                filtered = allProducts.filter(p => p.product && ((p.product.includes('FUELLE') && p.product.includes('SEMIEJE')) || (p.product.includes('FUELLE') && p.product.includes('TRANSMISION'))));
            } else if (selectedType === 'TOPE') {
                filtered = allProducts.filter(p => p.product && p.product.includes('TOPE'));
            } else if (selectedType === 'FD') {
                filtered = allProducts.filter(p => p.product && p.product.includes('FUELLE') && p.product.includes('DIRECCION'));
            }
            currentProducts = filtered.map(p => {
                const measures = extractMeasures(p);
                return { ...p, measures };
            }).filter(p => p.measures.dm !== null || p.measures.di !== null);
            if (currentProducts.length === 0) {
                document.getElementById('productsTable').innerHTML = '<div class="no-data">No se encontraron productos con medidas</div>';
                document.getElementById('tableSection').classList.add('active');
                document.getElementById('typeSelector').style.display = 'none';
                return;
            }
            renderTable();
        }
        function extractMeasures(product) {
            const measures = { dm: null, dn: null, l: null, di: null, a: null, m: null };
            if (!product.attributes || !Array.isArray(product.attributes)) return measures;
            product.attributes.forEach(attr => {
                const name = attr.name.toUpperCase();
                const value = attr.value;
                if (name.includes('DIÁMETRO') && name.includes('MAYOR') && name.includes('BOCA')) {
                    measures.dm = parseFloat(value) || null;
                } else if (name.includes('DIÁMETRO') && name.includes('MENOR') && name.includes('BOCA')) {
                    measures.dn = parseFloat(value) || null;
                } else if (name.includes('LARGO')) {
                    measures.l = parseFloat(value) || null;
                } else if (name.includes('DIÁMETRO') && name.includes('INTERIOR') && !name.includes('BOCA')) {
                    measures.di = parseFloat(value) || null;
                } else if (name.includes('ALTURA')) {
                    measures.a = parseFloat(value) || null;
                } else if (name.includes('MATERIAL')) {
                    measures.m = value || null;
                }
            });
            return measures;
        }
        function sortTable(colIndex) {
            if (sortColumn === colIndex) { sortAsc = !sortAsc; } else { sortColumn = colIndex; sortAsc = false; }
            renderTable();
        }
        function renderTable() {
            const container = document.getElementById('productsTable');
            const title = document.getElementById('tableTitle');
            let headers, keys;
            if (selectedType === 'TOPE') {
                title.textContent = 'TOPES';
                headers = ['Diám.Int.', 'Altura', 'Material', 'Código'];
                keys = ['di', 'a', 'm', 'code'];
            } else {
                title.textContent = selectedType === 'FT' ? 'FUELLE TRANSMISIÓN' : 'FUELLE DIRECCIÓN';
                headers = ['Diám.Mayor', 'Diám.Menor', 'Largo', 'Código'];
                keys = ['dm', 'dn', 'l', 'code'];
            }
            const sorted = [...currentProducts].sort((a, b) => {
                const key = keys[sortColumn];
                let valA = key === 'code' ? a.code : a.measures[key];
                let valB = key === 'code' ? b.code : b.measures[key];
                if (valA === null && valB === null) return 0;
                if (valA === null) return 1;
                if (valB === null) return -1;
                if (typeof valA === 'number') return sortAsc ? valA - valB : valB - valA;
                return sortAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
            });
            let html = '<table><thead><tr>';
            headers.forEach((h, i) => {
                const indicator = sortColumn === i ? (sortAsc ? ' ↑' : ' ↓') : '';
                html += '<th onclick="sortTable(' + i + ')">' + h + '<span class="sort-indicator">' + indicator + '</span></th>';
            });
            html += '</tr></thead><tbody>';
            sorted.forEach(p => {
                html += '<tr onclick="window.location.href=\'/?product=' + p.code + '\'">';
                if (selectedType === 'TOPE') {
                    const di = p.measures.di !== null ? p.measures.di : '-';
                    const a = p.measures.a !== null ? p.measures.a : '-';
                    const m = p.measures.m || '-';
                    html += '<td class="measure-cell">' + di + '</td><td class="measure-cell">' + a + '</td><td>' + m + '</td><td class="code-cell">' + p.code + '</td>';
                } else {
                    const dm = p.measures.dm !== null ? p.measures.dm : '-';
                    const dn = p.measures.dn !== null ? p.measures.dn : '-';
                    const l = p.measures.l !== null ? p.measures.l : '-';
                    html += '<td class="measure-cell">' + dm + '</td><td class="measure-cell">' + dn + '</td><td class="measure-cell">' + l + '</td><td class="code-cell">' + p.code + '</td>';
                }
                html += '</tr>';
            });
            html += '</tbody></table>';
            container.innerHTML = html;
            document.getElementById('tableSection').classList.add('active');
            document.getElementById('typeSelector').style.display = 'none';
        }
        function clearAll() {
            selectedType = null;
            sortColumn = 0;
            sortAsc = false;
            currentProducts = [];
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('tableSection').classList.remove('active');
            document.getElementById('typeSelector').style.display = 'grid';
        }
        init();
    </script>
</body>
</html>
